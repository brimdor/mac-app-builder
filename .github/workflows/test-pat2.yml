name: Test PAT2
on: workflow_dispatch
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check PAT identity (raw)
        env:
          PAT: ${{ secrets.PAT_GITHUB_TOKEN }}
        run: |
          echo "PAT length: ${#PAT}"
          echo "PAT first 4 chars (hex):"
          echo -n "$PAT" | head -c 4 | xxd
          echo ""
          echo "Trying with x-access-token format (as checkout does)..."
          curl -s -H "Authorization: token ${PAT}" "https://api.github.com/user" | head -3
          echo ""
          echo "Trying with Basic auth (x-access-token:PAT base64)..."
          B64=$(echo -n "x-access-token:${PAT}" | base64 -w 0)
          echo "B64 length: ${#B64}"
          curl -s -H "Authorization: Basic ${B64}" "https://api.github.com/user" | head -3
