name: Release per-app .app and .dmg

# Triggers on tag push: v0.3.0, v1.0.0, etc.
on:
  push:
    tags:
      - 'v*'

# DO NOT add workflow_dispatch — it creates a race condition where two
# builds overwrite the same release assets with different signatures.
# Removed in v0.3.9: only tag push triggers a build.

# Cancel in-progress runs for the same tag
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false   # don't cancel a release in progress

# Need write permission to create releases, upload assets, and push appcast commits.
# GITHUB_TOKEN works for tag-push triggers: the recursion guard does not
# apply to direct `push` events, so the same workflow can push appcast
# updates back to main without needing a PAT.
permissions:
  contents: write

jobs:
  release:
    name: Build & publish ${{ matrix.app }} ${{ github.ref_name }}
    runs-on: macos-14
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        app: [odysseus]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python (for signing + appcast generation)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python signing deps
        run: python3 -m pip install cryptography

      - name: Read version from tag
        id: version
        run: |
          # Tag is v0.3.0 → VERSION=0.3.0
          echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build the .app
        run: ./ci/build-app.sh ${{ matrix.app }}

      - name: Cardinal Rule test
        run: |
          APP_NAME="$(echo '${{ matrix.app }}' | awk '{print toupper(substr($0,1,1)) substr($0,2)}')"
          ./ci/cardinal-rule-test.sh "dist/${APP_NAME}.app"

      - name: Lift-and-shift test
        run: |
          APP_NAME="$(echo '${{ matrix.app }}' | awk '{print toupper(substr($0,1,1)) substr($0,2)}')"
          ./ci/lift-and-shift-test.sh "dist/${APP_NAME}.app"

      - name: Package .dmg
        run: ./ci/package-dmg.sh ${{ matrix.app }} ${{ steps.version.outputs.VERSION }}

      - name: Sign .app
        run: |
          APP_NAME="$(echo '${{ matrix.app }}' | awk '{print toupper(substr($0,1,1)) substr($0,2)}')"
          ./ci/sign-app.sh "dist/${APP_NAME}.app"

      - name: Sign .dmg + generate appcast
        env:
          ODYSSEUS_UPDATE_PRIVATE_KEY_PEM: ${{ secrets.ODYSSEUS_UPDATE_PRIVATE_KEY_PEM }}
        run: |
          # Compute the public URL the .dmg will live at once released.
          # GitHub Releases: https://github.com/<owner>/<repo>/releases/download/<tag>/<file>
          APP_NAME="$(echo '${{ matrix.app }}' | awk '{print toupper(substr($0,1,1)) substr($0,2)}')"
          DMG_FILE="${APP_NAME}-${{ steps.version.outputs.VERSION }}.dmg"
          DMG_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${DMG_FILE}"
          ./ci/publish-release.sh ${{ matrix.app }} ${{ steps.version.outputs.VERSION }} "$DMG_URL"

      - name: Create GitHub Release with .dmg
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            appcasts/${{ matrix.app }}.xml
          generate_release_notes: true
          # Don't fail the release if the appcast-only release is empty
          fail_on_unmatched_files: false

      - name: Commit updated appcast back to main
        # CRITICAL: this step signs the CI-built .dmg and generates the
        # appcast.xml with the CORRECT signature for that exact .dmg file.
        # NEVER modify appcasts/<app>.xml manually on a local machine —
        # the CI-built .dmg and locally-built .dmg have different file
        # sizes, so their signatures will never match.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # `git diff --quiet` exits 0 when there are NO differences and
          # 1 when there ARE differences. So `if git diff --quiet` enters
          # the block when nothing changed.
          if git diff --quiet -- appcasts/${{ matrix.app }}.xml; then
            echo "No appcast changes to commit"
            exit 0
          fi

          echo "Appcast changed; committing to main"

          # Use the gh API to commit the appcast directly to main. This
          # avoids the rebase loop entirely: the API takes a base tree
          # SHA and applies a commit on top, so concurrent commits don't
          # conflict — the only risk is a non-fast-forward if multiple
          # releases try to update main at once, which we handle with a
          # single retry.
          APPCAST_PATH="appcasts/${{ matrix.app }}.xml"
          COMMIT_MSG="Release ${{ matrix.app }} ${{ steps.version.outputs.VERSION }}: update appcast"

          attempt=0
          max_attempts=3
          while [ $attempt -lt $max_attempts ]; do
            attempt=$((attempt + 1))

            # Get the current tip of main
            BASE_SHA=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq .object.sha)
            BASE_TREE=$(gh api "repos/${GITHUB_REPOSITORY}/git/commits/${BASE_SHA}" --jq .tree.sha)

            # Build the new tree containing just the updated appcast.
            # Use --input with a JSON body so the XML content is sent
            # verbatim (form fields would percent-encode the angle brackets).
            TREE_BODY=$(jq -n \
              --arg base_tree "$BASE_TREE" \
              --arg path "$APPCAST_PATH" \
              --rawfile content "$APPCAST_PATH" \
              '{base_tree: $base_tree, tree: [{path: $path, mode: "100644", type: "blob", content: $content}]}')
            NEW_TREE=$(echo "$TREE_BODY" | gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              "repos/${GITHUB_REPOSITORY}/git/trees" \
              --input - \
              --jq .sha 2>/tmp/tree-err) || {
                echo "::warning::tree creation failed (attempt $attempt):"
                cat /tmp/tree-err
                sleep $((attempt * 5))
                continue
              }

            # Create the commit. The parents array is sent as JSON.
            COMMIT_BODY=$(jq -n \
              --arg msg "$COMMIT_MSG" \
              --arg tree "$NEW_TREE" \
              --arg parent "$BASE_SHA" \
              '{message: $msg, tree: $tree, parents: [$parent]}')
            NEW_COMMIT=$(echo "$COMMIT_BODY" | gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              "repos/${GITHUB_REPOSITORY}/git/commits" \
              --input - \
              --jq .sha 2>/tmp/commit-err) || {
                echo "::warning::commit creation failed (attempt $attempt):"
                cat /tmp/commit-err
                sleep $((attempt * 5))
                continue
              }

            # Update the ref. May fail with 422 if main moved; retry.
            REF_BODY=$(jq -n --arg sha "$NEW_COMMIT" '{sha: $sha, force: false}')
            if echo "$REF_BODY" | gh api \
              --method PATCH \
              -H "Accept: application/vnd.github+json" \
              "repos/${GITHUB_REPOSITORY}/git/refs/heads/main" \
              --input - >/dev/null 2>/tmp/ref-err; then
              echo "Appcast committed to main: $NEW_COMMIT"
              exit 0
            fi

            echo "::warning::ref update raced (attempt $attempt); retrying"
            cat /tmp/ref-err
            sleep $((attempt * 5))
          done

          echo "::error::Failed to commit appcast after $max_attempts attempts"
          exit 1
