name: Release per-app .app and .dmg

# Triggers:
#   1. Tag push (v0.3.0, v1.0.0, etc.) — fires when a tag is pushed by
#      a human (e.g. `git push origin v1.0.0`) or by a workflow that has
#      a non-GITHUB_TOKEN identity (e.g. a GitHub App or a PAT).
#   2. workflow_dispatch from this repo's own workflows — used by
#      daily-upstream-check.yml because GitHub's recursion guard
#      blocks GITHUB_TOKEN from triggering `push: tags:` workflows.
#
# Why workflow_dispatch is safe here:
#   - The release workflow is still keyed on a unique tag (v*).
#     The dispatch caller passes a version; we re-create that tag
#     if missing and only one release can be in-flight per tag
#     (enforced by the concurrency group below).
#   - We refuse to dispatch with a version that already has a tag
#     pointing to a non-empty release, preventing accidental
#     overwrite of a finished release.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.3.13). Must not already have a published release.'
        required: true
        type: string

# Cancel in-progress runs for the same tag
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false   # don't cancel a release in progress

# Need write permission to create releases, upload assets, and push appcast commits.
# GITHUB_TOKEN is fine here: this workflow is not the source of recursion (it
# pushes appcast updates via the git data API, which is a write to the repo,
# not a workflow trigger).
permissions:
  contents: write

jobs:
  release:
    name: Build & publish ${{ matrix.app }} ${{ steps.resolve.outputs.VERSION }}
    runs-on: macos-14
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        app: [odysseus]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version (tag push OR workflow_dispatch)
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            if ! [[ "$VERSION" =~ ^[0-9]+(\.[0-9]+)+$ ]]; then
              echo "::error::workflow_dispatch 'version' input is malformed: '$VERSION'"
              exit 1
            fi
            # Refuse to dispatch if a release for this version already exists.
            if gh release view "v${VERSION}" >/dev/null 2>&1; then
              echo "::error::Release v${VERSION} already exists. Refusing to rebuild."
              exit 1
            fi
            # Anchor VERSION to the current main tip. The dispatch caller
            # doesn't pass a SHA; we just build from whatever main is now.
            # This is fine because the daily-upstream-check caller creates
            # the version-bump commit on main right before dispatching us,
            # and the dispatch goes through immediately.
            ANCHOR_SHA=$(git rev-parse origin/main)
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git tag -f "v${VERSION}" "$ANCHOR_SHA"
          else
            # Tag push: VERSION comes from the ref name (e.g. refs/tags/v0.3.13).
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved release version: ${VERSION}"

      - name: Build the .app
        run: ./ci/build-app.sh ${{ matrix.app }}

      - name: Cardinal Rule test
        run: |
          APP_NAME="$(echo '${{ matrix.app }}' | awk '{print toupper(substr($0,1,1)) substr($0,2)}')"
          ./ci/cardinal-rule-test.sh "dist/${APP_NAME}.app"

      - name: Lift-and-shift test
        run: |
          APP_NAME="$(echo '${{ matrix.app }}' | awk '{print toupper(substr($0,1,1)) substr($0,2)}')"
          ./ci/lift-and-shift-test.sh "dist/${APP_NAME}.app"

      - name: Package .dmg
        run: ./ci/package-dmg.sh ${{ matrix.app }} ${{ steps.resolve.outputs.VERSION }}

      - name: Sign .app
        run: |
          APP_NAME="$(echo '${{ matrix.app }}' | awk '{print toupper(substr($0,1,1)) substr($0,2)}')"
          ./ci/sign-app.sh "dist/${APP_NAME}.app"

      - name: Sign .dmg + generate appcast
        env:
          ODYSSEUS_UPDATE_PRIVATE_KEY_PEM: ${{ secrets.ODYSSEUS_UPDATE_PRIVATE_KEY_PEM }}
        run: |
          # Compute the public URL the .dmg will live at once released.
          # GitHub Releases: https://github.com/<owner>/<repo>/releases/download/<tag>/<file>
          APP_NAME="$(echo '${{ matrix.app }}' | awk '{print toupper(substr($0,1,1)) substr($0,2)}')"
          DMG_FILE="${APP_NAME}-${{ steps.resolve.outputs.VERSION }}.dmg"
          # For tag-push, GITHUB_REF_NAME is the tag. For workflow_dispatch,
          # we need to construct the tag name from the resolved version.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="v${{ steps.resolve.outputs.VERSION }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          DMG_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${DMG_FILE}"
          echo "DMG_URL=${DMG_URL}" >> "$GITHUB_ENV"
          ./ci/publish-release.sh ${{ matrix.app }} ${{ steps.resolve.outputs.VERSION }} "$DMG_URL"

      - name: Create GitHub Release with .dmg
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', steps.resolve.outputs.VERSION) || github.ref_name }}
          files: |
            dist/*.dmg
            appcasts/${{ matrix.app }}.xml
          generate_release_notes: true
          # Don't fail the release if the appcast-only release is empty
          fail_on_unmatched_files: false

      - name: Commit updated appcast back to main
        # CRITICAL: this step signs the CI-built .dmg and generates the
        # appcast.xml with the CORRECT signature for that exact .dmg file.
        # NEVER modify appcasts/<app>.xml manually on a local machine —
        # the CI-built .dmg and locally-built .dmg have different file
        # sizes, so their signatures will never match.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # `git diff --quiet` exits 0 when there are NO differences and
          # 1 when there ARE differences. So `if git diff --quiet` enters
          # the block when nothing changed.
          if git diff --quiet -- appcasts/${{ matrix.app }}.xml; then
            echo "No appcast changes to commit"
            exit 0
          fi

          echo "Appcast changed; committing to main"

          # Use the gh API to commit the appcast directly to main. This
          # avoids the rebase loop entirely: the API takes a base tree
          # SHA and applies a commit on top, so concurrent commits don't
          # conflict — the only risk is a non-fast-forward if multiple
          # releases try to update main at once, which we handle with a
          # single retry.
          APPCAST_PATH="appcasts/${{ matrix.app }}.xml"
          COMMIT_MSG="Release ${{ matrix.app }} ${{ steps.resolve.outputs.VERSION }}: update appcast"

          attempt=0
          max_attempts=3
          while [ $attempt -lt $max_attempts ]; do
            attempt=$((attempt + 1))

            # Get the current tip of main
            BASE_SHA=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq .object.sha)
            BASE_TREE=$(gh api "repos/${GITHUB_REPOSITORY}/git/commits/${BASE_SHA}" --jq .tree.sha)

            # Build the new tree containing just the updated appcast.
            # Use --input with a JSON body so the XML content is sent
            # verbatim (form fields would percent-encode the angle brackets).
            TREE_BODY=$(jq -n \
              --arg base_tree "$BASE_TREE" \
              --arg path "$APPCAST_PATH" \
              --rawfile content "$APPCAST_PATH" \
              '{base_tree: $base_tree, tree: [{path: $path, mode: "100644", type: "blob", content: $content}]}')
            NEW_TREE=$(echo "$TREE_BODY" | gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              "repos/${GITHUB_REPOSITORY}/git/trees" \
              --input - \
              --jq .sha 2>/tmp/tree-err) || {
                echo "::warning::tree creation failed (attempt $attempt):"
                cat /tmp/tree-err
                sleep $((attempt * 5))
                continue
              }

            # Create the commit. The parents array is sent as JSON.
            COMMIT_BODY=$(jq -n \
              --arg msg "$COMMIT_MSG" \
              --arg tree "$NEW_TREE" \
              --arg parent "$BASE_SHA" \
              '{message: $msg, tree: $tree, parents: [$parent]}')
            NEW_COMMIT=$(echo "$COMMIT_BODY" | gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              "repos/${GITHUB_REPOSITORY}/git/commits" \
              --input - \
              --jq .sha 2>/tmp/commit-err) || {
                echo "::warning::commit creation failed (attempt $attempt):"
                cat /tmp/commit-err
                sleep $((attempt * 5))
                continue
              }

            # Update the ref. May fail with 422 if main moved; retry.
            REF_BODY=$(jq -n --arg sha "$NEW_COMMIT" '{sha: $sha, force: false}')
            if echo "$REF_BODY" | gh api \
              --method PATCH \
              -H "Accept: application/vnd.github+json" \
              "repos/${GITHUB_REPOSITORY}/git/refs/heads/main" \
              --input - >/dev/null 2>/tmp/ref-err; then
              echo "Appcast committed to main: $NEW_COMMIT"
              exit 0
            fi

            echo "::warning::ref update raced (attempt $attempt); retrying"
            cat /tmp/ref-err
            sleep $((attempt * 5))
          done

          echo "::error::Failed to commit appcast after $max_attempts attempts"
          exit 1
