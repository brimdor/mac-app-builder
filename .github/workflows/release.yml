name: Release per-app .app and .dmg

# Triggers on tag push: v0.3.0, v1.0.0, etc.
on:
  push:
    tags:
      - 'v*'

# Allow manual trigger for testing
  workflow_dispatch:

# Cancel in-progress runs for the same tag
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false   # don't cancel a release in progress

jobs:
  release:
    name: Build & publish ${{ matrix.app }} ${{ github.ref_name }}
    runs-on: macos-14
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        app: [odysseus]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python (for signing + appcast generation)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python signing deps
        run: python3 -m pip install cryptography

      - name: Read version from tag
        id: version
        run: |
          # Tag is v0.3.0 → VERSION=0.3.0
          echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build the .app
        run: ./ci/build-app.sh ${{ matrix.app }}

      - name: Cardinal Rule test
        run: ./ci/cardinal-rule-test.sh "dist/$(echo ${{ matrix.app }} | tr '[:lower:]' '[:upper:]' | cut -c1)$(echo ${{ matrix.app }} | cut -c2-).app"

      - name: Lift-and-shift test
        run: ./ci/lift-and-shift-test.sh "dist/$(echo ${{ matrix.app }} | tr '[:lower:]' '[:upper:]' | cut -c1)$(echo ${{ matrix.app }} | cut -c2-).app"

      - name: Package .dmg
        run: ./ci/package-dmg.sh ${{ matrix.app }} ${{ steps.version.outputs.VERSION }}

      - name: Sign .app
        run: ./ci/sign-app.sh "dist/$(echo ${{ matrix.app }} | tr '[:lower:]' '[:upper:]' | cut -c1)$(echo ${{ matrix.app }} | cut -c2-).app"

      - name: Sign .dmg + generate appcast
        env:
          ODYSSEUS_UPDATE_PRIVATE_KEY_PEM: ${{ secrets.ODYSSEUS_UPDATE_PRIVATE_KEY_PEM }}
        run: |
          # Compute the public URL the .dmg will live at once released.
          # GitHub Releases: https://github.com/<owner>/<repo>/releases/download/<tag>/<file>
          DMG_FILE="$(echo ${{ matrix.app }} | tr '[:lower:]' '[:upper:]' | cut -c1)$(echo ${{ matrix.app }} | cut -c2-)-${{ steps.version.outputs.VERSION }}.dmg"
          DMG_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${DMG_FILE}"
          ./ci/publish-release.sh ${{ matrix.app }} ${{ steps.version.outputs.VERSION }} "$DMG_URL"

      - name: Create GitHub Release with .dmg
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            appcasts/${{ matrix.app }}.xml
          generate_release_notes: true
          # Don't fail the release if the appcast-only release is empty
          fail_on_unmatched_files: false

      - name: Commit updated appcast back to main
        # Only do this for tags that match main. Don't push tags
        # to main if the tag was made from a feature branch.
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add appcasts/${{ matrix.app }}.xml
          if git diff --cached --quiet; then
            echo "No appcast changes to commit"
          else
            git commit -m "Release ${{ matrix.app }} ${{ steps.version.outputs.VERSION }}: update appcast"
            # Push to main (tag push refs are immutable, so we target the branch)
            git push origin HEAD:main
          fi
