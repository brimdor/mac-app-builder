name: Daily Build Health Check

on:
  schedule:
    - cron: '0 10 * * *'   # 5:00 AM CDT (UTC-5) → 10:00 UTC
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Check latest build status
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching latest build run..."
          RUN_JSON=$(curl -s -H "Authorization: token $GH_TOKEN"             -H "Accept: application/vnd.github+json"             "https://api.github.com/repos/${{ github.repository }}/actions/workflows/build.yml/runs?per_page=1")

          CONCLUSION=$(echo "$RUN_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['workflow_runs'][0]['conclusion'])")
          STATUS=$(echo "$RUN_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['workflow_runs'][0]['status'])")
          RUN_ID=$(echo "$RUN_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['workflow_runs'][0]['id'])")

          echo "Latest run $RUN_ID — status: $STATUS, conclusion: $CONCLUSION"
          echo "conclusion=$CONCLUSION" >> "$GITHUB_OUTPUT"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

          if [ "$CONCLUSION" = "success" ]; then
            echo "✅ Latest build is healthy. No action needed."
            exit 0
          elif [ "$STATUS" = "in_progress" ] || [ "$STATUS" = "queued" ]; then
            echo "⏳ Latest build is still running. Skipping trigger."
            exit 0
          else
            echo "❌ Latest build concluded as: $CONCLUSION"
            exit 1
          fi

      - name: Retrigger build (heal)
        if: failure() && steps.check.outputs.conclusion != 'in_progress'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering workflow_dispatch for build.yml ..."
          curl -s -X POST             -H "Authorization: token $GH_TOKEN"             -H "Accept: application/vnd.github+json"             "https://api.github.com/repos/${{ github.repository }}/actions/workflows/build.yml/dispatches"             -d '{"ref":"main"}'
          echo "🔄 Retriggered build.yml on main."
