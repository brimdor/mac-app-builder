name: Daily upstream update check

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: upstream-check-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check-upstream:
    name: Check upstream Odysseus
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout mac-app-builder
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Check upstream for new commits
        id: check
        run: |
          ./ci/check-upstream.sh odysseus
          if git describe --tags --exact-match HEAD 2>/dev/null; then
            TAG=$(git describe --tags --exact-match HEAD)
            echo "NEW_TAG=$TAG" >> "$GITHUB_OUTPUT"
            echo "NEW_VERSION=${TAG#v}" >> "$GITHUB_OUTPUT"
            echo "Created tag: $TAG"
          else
            echo "No new tag created"
          fi

      - name: Push version bump + tag
        if: steps.check.outputs.NEW_TAG != ''
        run: |
          # Use PAT in the remote URL to trigger downstream workflows
          git remote set-url origin https://x-access-token:${{ secrets.PAT_GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push origin main
          git push origin "${{ steps.check.outputs.NEW_TAG }}"

      - name: Summarize
        run: |
          if [ -n "${{ steps.check.outputs.NEW_TAG }}" ]; then
            echo "New upstream release triggered: ${{ steps.check.outputs.NEW_TAG }}"
          else
            echo "Upstream is up to date. No release needed."
          fi
