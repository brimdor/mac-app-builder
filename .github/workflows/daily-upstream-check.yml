name: Daily upstream update check

# Run every day at 6:00 UTC (pick a quiet time)
on:
  schedule:
    - cron: '0 6 * * *'
  # Allow manual trigger for testing
  workflow_dispatch:

# Prevent concurrent runs
concurrency:
  group: upstream-check-${{ github.ref }}
  cancel-in-progress: false

# Need write permission to push version bumps, tags, and trigger releases
permissions:
  contents: write

jobs:
  check-upstream:
    name: Check upstream Odysseus
    runs-on: ubuntu-latest  # lightweight — just clones + compares commits
    timeout-minutes: 5

    steps:
      - name: Checkout mac-app-builder
        uses: actions/checkout@v4
        with:
          # Need full history to create tags
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Check upstream for new commits
        id: check
        run: |
          ./ci/check-upstream.sh odysseus
          # If check-upstream exits 0 (no update), this step succeeds.
          # If it creates a tag, we capture it.
          if git describe --tags --exact-match HEAD 2>/dev/null; then
            TAG=$(git describe --tags --exact-match HEAD)
            echo "NEW_TAG=$TAG" >> "$GITHUB_OUTPUT"
            echo "NEW_VERSION=${TAG#v}" >> "$GITHUB_OUTPUT"
            echo "Created tag: $TAG"
          else
            echo "No new tag created"
          fi

      - name: Push version bump + tag
        if: steps.check.outputs.NEW_TAG != ''
        run: |
          git push origin main
          git push origin "${{ steps.check.outputs.NEW_TAG }}"

      - name: Summarize
        run: |
          if [ -n "${{ steps.check.outputs.NEW_TAG }}" ]; then
            echo "✅ New upstream release triggered: ${{ steps.check.outputs.NEW_TAG }}"
            echo "   The release workflow (.github/workflows/release.yml) will now"
            echo "   build, sign, and publish the updated .app on a macOS runner."
          else
            echo "✅ Upstream is up to date. No release needed."
          fi
