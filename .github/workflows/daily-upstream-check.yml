name: Daily upstream update check

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: upstream-check-${{ github.ref }}
  cancel-in-progress: false

# GITHUB_TOKEN is sufficient for the upstream detection + version bump.
# We dispatch release.yml via the workflow dispatch API (not a tag push)
# because GitHub's recursion guard blocks GITHUB_TOKEN from triggering
# workflows on `push: tags:` events. workflow_dispatch is the one
# trigger the recursion guard explicitly allows to fire from
# GITHUB_TOKEN, but it requires the `actions: write` permission
# (in addition to `contents: write` for the version-bump push).
permissions:
  contents: write
  actions: write

jobs:
  check-upstream:
    name: Check upstream ${{ matrix.app }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        # To add a new per-app, add its name here. Each must have an entry
        # under apps/<name>/webappify.yaml and apps/<name>/.upstream-commit.
        app: [odysseus]

    steps:
      - name: Checkout mac-app-builder
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # No token: use the default GITHUB_TOKEN. It is provisioned by
          # GitHub Actions and works for both fetch and push within this job.
          persist-credentials: true

      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Check upstream for new commits
        id: check
        run: |
          ./ci/check-upstream.sh "${{ matrix.app }}"
          if git describe --tags --exact-match HEAD 2>/dev/null; then
            TAG=$(git describe --tags --exact-match HEAD)
            # Drop the 'v' prefix — release.yml's workflow_dispatch input
            # wants just the numeric version.
            VERSION="${TAG#v}"
            echo "NEW_VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "Created local tag ${TAG}; will dispatch release for v${VERSION}"
          else
            echo "No new tag created"
          fi

      - name: Push version bump to main
        # Always push the version-bump commit (if any) so the commit is
        # visible on main regardless of whether the release gets dispatched.
        if: steps.check.outputs.NEW_VERSION != ''
        run: |
          # If there's nothing new to push (race with another runner),
          # `git push` exits non-zero — treat that as a soft failure.
          if ! git push origin HEAD:main; then
            echo "::warning::git push origin HEAD:main failed (likely a race); continuing"
          fi

      - name: Dispatch release workflow
        if: steps.check.outputs.NEW_VERSION != ''
        env:
          NEW_VERSION: ${{ steps.check.outputs.NEW_VERSION }}
          # gh api requires GH_TOKEN in CI — without it, `gh` looks for a
          # local `gh auth login` session (which doesn't exist on the
          # runner) and exits with code 4 + a "set the GH_TOKEN
          # environment variable" error. The default GITHUB_TOKEN is
          # sufficient: the dispatch endpoint only needs repo access,
          # not a PAT.
          GH_TOKEN: ${{ github.token }}
        run: |
          # Sanity check: refuse to dispatch with a malformed version.
          if ! [[ "$NEW_VERSION" =~ ^[0-9]+(\.[0-9]+)+$ ]]; then
            echo "::error::Refusing to dispatch release for malformed version: '$NEW_VERSION'"
            exit 1
          fi

          # Refuse to dispatch if a release for this version already exists
          # (avoids clobbering a previous run that may have succeeded).
          if gh release view "v${NEW_VERSION}" >/dev/null 2>&1; then
            echo "::warning::Release v${NEW_VERSION} already exists; skipping dispatch"
            exit 0
          fi

          echo "Dispatching release.yml for v${NEW_VERSION}…"
          # IMPORTANT: this step runs with `set -e` (shell: bash -e {0}).
          # Two failure modes to guard against:
          #
          # 1. `gh api --method POST -f key=value` builds a
          #    application/x-www-form-urlencoded body. GitHub's workflow
          #    dispatch endpoint expects application/json with a nested
          #    `inputs` object. Form-encoding the bracketed key
          #    `inputs[version]` produces a body the server rejects
          #    with HTTP 422, which `gh api` surfaces as exit code 4
          #    — killing the script under `set -e` with a cryptic
          #    "Process completed with exit code 4." Use --input +
          #    jq to build a real JSON body, the same pattern
          #    release.yml uses for its appcast commit.
          #
          # 2. gh api returns exit 4 on any HTTP 4xx. Capture the
          #    exit code explicitly so the failure surfaces as a
          #    ::error:: with the API's response body, not as an
          #    opaque script death.
          DISPATCH_BODY=$(jq -n \
            --arg ref "main" \
            --arg ver "${NEW_VERSION}" \
            '{ref: $ref, inputs: {version: $ver}}')
          set +e
          RESPONSE=$(echo "$DISPATCH_BODY" | gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/release.yml/dispatches" \
            --input - 2>&1)
          GH_EXIT=$?
          set -e
          if [ $GH_EXIT -eq 0 ] && [ -z "$RESPONSE" ]; then
            echo "✓ Dispatched release for v${NEW_VERSION}"
          else
            echo "::error::Dispatch failed (gh api exit $GH_EXIT): $RESPONSE"
            exit 1
          fi

      - name: Summarize
        if: always()
        env:
          NEW_VERSION: ${{ steps.check.outputs.NEW_VERSION }}
        run: |
          if [ -n "$NEW_VERSION" ]; then
            echo "::notice::New upstream release dispatched: v${NEW_VERSION}"
            echo "Watch it build at: https://github.com/${GITHUB_REPOSITORY}/actions/workflows/release.yml"
          else
            echo "Upstream is up to date. No release needed."
          fi
